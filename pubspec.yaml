name: ble_alarm_receiver
description: "BLE Alarm Receiver - приемник сигналов охранной сигнализации"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.36.8
  provider: ^6.1.2
  permission_handler: ^11.3.1
  intl: ^0.19.0
  sqflite: ^2.3.3+1
  path: ^1.9.0  # Исправлено: path должен быть ^1.9.0, а не ^9.0.0
  share_plus: ^9.0.0
  csv: ^6.0.0
  flutter_local_notifications: ^17.2.1
  url_launcher: ^6.3.0
  fl_chart: ^0.68.0
  animations: ^2.0.11
  path_provider: ^2.1.3  # Добавлено для работы с файлами
#  "coreLibraryDesugaring"("com.android.tools:desugar_jdk_libs:2.1.4")

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/